<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="All in Night">
    <title>All in Night - 德州扑克升盲应用</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --bg-card-alt: #252525;
            --gold: #c9a84c;
            --gold-light: #e0c56e;
            --gold-dark: #a07d2e;
            --text-primary: #f0e6d3;
            --text-secondary: #b8a88a;
            --text-muted: #7a6f5d;
            --accent-green: #27ae60;
            --border-color: #333;
            --danger: #e74c3c;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            background-image:
                radial-gradient(ellipse at center, rgba(30, 25, 15, 0.9) 0%, rgba(10, 8, 5, 0.98) 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, 0.003) 2px, rgba(255, 255, 255, 0.003) 4px);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 8px 12px 16px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            position: relative;
        }

        /* 右上角提示 */
        .top-right-note {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            opacity: 0.8;
            z-index: 10;
            pointer-events: none;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 10px 0 6px;
            position: relative;
        }

        .header-title {
            font-size: 2.4rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            background: linear-gradient(180deg, #f7d774 0%, #c9a84c 25%, #e8c860 40%, #b8942e 60%, #d4af4a 75%, #f0d068 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(200, 160, 60, 0.5));
            line-height: 1.1;
            display: inline-block;
            margin-bottom: 4px;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 50%;
        }

        .header-subtitle {
            font-size: 0.9rem;
            color: var(--gold-light);
            letter-spacing: 0.2em;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* 主内容 - 横向排列 */
        .main-content {
            display: flex;
            gap: 12px;
            flex: 1;
            margin-top: 6px;
            min-height: 0;
        }

        .left-panel {
            flex: 0 0 60%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .right-panel {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 160, 60, 0.3), transparent);
            opacity: 0.6;
        }

        .level-display {
            text-align: center;
            padding: 2px 0;
        }

        .level-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 1px;
        }

        .level-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--gold-light);
            line-height: 1;
        }

        .blinds-display {
            text-align: center;
            padding: 8px 0;
            background: var(--bg-card-alt);
            border-radius: 10px;
            margin: 4px 0;
            border: 2px solid rgba(200, 160, 60, 0.25);
        }

        .blinds-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.03em;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
        }

        .blinds-label-sm {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        .timer-display {
            text-align: center;
            padding: 6px 0;
        }

        .timer-value {
            font-size: 2.4rem;
            font-weight: 900;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            color: #fff;
            letter-spacing: 0.04em;
            transition: color 0.3s;
        }

        .timer-value.warning {
            color: #f39c12;
            animation: pulse-warning 0.8s ease-in-out infinite;
        }
        .timer-value.danger {
            color: #e74c3c;
            animation: pulse-danger 0.5s ease-in-out infinite;
        }

        @keyframes pulse-warning {
            0%,100% { opacity:1; }
            50% { opacity:0.6; }
        }
        @keyframes pulse-danger {
            0%,100% { opacity:1; }
            50% { opacity:0.4; }
        }

        .timer-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 50px;
            padding: 8px 6px;
            border-radius: 8px;
            border: 1px solid transparent;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all 0.2s;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-start {
            background: var(--accent-green);
            color: #fff;
            border-color: #2ecc71;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.3);
        }
        .btn-start.running {
            background: #f39c12;
            border-color: #f1c40f;
            color: #1a1a1a;
        }

        .btn-reset {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border-color);
        }
        .btn-reset:active { background: rgba(255,255,255,0.06); }

        .btn-add-player {
            background: transparent;
            color: var(--gold-light);
            border-color: rgba(200, 160, 60, 0.4);
            font-size: 0.75rem;
        }
        .btn-add-player:active { background: rgba(200, 160, 60, 0.1); }

        .btn-skip {
            background: transparent;
            color: #e67e22;
            border-color: rgba(230, 126, 34, 0.4);
            font-size: 0.7rem;
        }
        .btn-skip:active { background: rgba(230, 126, 34, 0.1); }

        .leaderboard-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px 2px;
        }

        .leaderboard-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .leaderboard-title .trophy-icon {
            font-size: 1rem;
        }

        .player-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .player-list::-webkit-scrollbar {
            width: 3px;
        }
        .player-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .player-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }

        .player-row {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            border-radius: 8px;
            padding: 4px 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            animation: fadeInRow 0.3s ease-out;
        }

        @keyframes fadeInRow {
            from { opacity:0; transform: translateY(-6px); }
            to { opacity:1; transform: translateY(0); }
        }

        .player-row.top-player {
            border-color: rgba(200, 160, 60, 0.5);
            background: linear-gradient(135deg, #1e1e1e 0%, #1a1810 100%);
            box-shadow: 0 0 15px rgba(200, 160, 60, 0.1);
        }

        .player-avatar-wrap {
            flex: 0 0 24px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: var(--bg-card-alt);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .player-avatar-placeholder {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .player-avatar-upload-hint {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: var(--gold-dark);
            border-radius: 50%;
            font-size: 6px;
            color: #fff;
            border: 1.5px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .player-info {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .player-name-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed transparent;
            color: var(--text-primary);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 1px 2px;
            width: auto;
            min-width: 40px;
            max-width: 70px;
            outline: none;
            font-family: inherit;
            letter-spacing: 0.02em;
        }

        .player-name-input:focus {
            border-bottom-color: var(--gold-light);
            background: rgba(255,255,255,0.03);
        }

        .championship-control {
            display: flex;
            align-items: center;
            gap: 2px;
            background: rgba(200, 160, 60, 0.08);
            border-radius: 5px;
            padding: 1px 4px;
        }

        .trophy-icon-sm {
            font-size: 0.65rem;
        }

        .champ-count {
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--gold-light);
            min-width: 14px;
            text-align: center;
        }

        .champ-btn {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(200, 160, 60, 0.35);
            background: transparent;
            color: var(--gold-light);
            cursor: pointer;
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            line-height: 1;
        }
        .champ-btn:active {
            background: rgba(200, 160, 60, 0.25);
            transform: scale(0.9);
        }

        .btn-delete-player {
            flex: 0 0 20px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .btn-delete-player:active {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #222;
            color: #fff;
            padding: 8px 16px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.4s;
            border: 1px solid var(--gold-dark);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.level-up {
            background: #1a1000;
            border-color: var(--gold);
            color: var(--gold-light);
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 20px;
        }

        .level-up-overlay {
            position: fixed;
            top:0;left:0;right:0;bottom:0;
            pointer-events: none;
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .level-up-overlay.active { opacity:1; }
        .level-up-badge {
            background: rgba(0,0,0,0.85);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 16px 24px;
            text-align: center;
            transform: scale(0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .level-up-overlay.active .level-up-badge { transform: scale(1); }
        .level-up-badge .lvl-text {
            font-size: 0.85rem;
            color: var(--gold-light);
        }
        .level-up-badge .lvl-blinds {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            margin-top: 2px;
        }

        @media (max-width: 480px) {
            .left-panel { flex: 0 0 60%; }
            .right-panel { flex: 0 0 40%; }
            .header-title { font-size: 1.8rem; }
            .header-subtitle { font-size: 0.7rem; }
            .top-right-note { font-size: 0.5rem; right: 10px; top: 8px; }
            .level-number { font-size: 1.4rem; }
            .blinds-value { font-size: 1.1rem; }
            .timer-value { font-size: 1.8rem; }
            .btn { font-size: 0.7rem; padding: 6px 4px; }
            .player-row { padding: 3px 6px; gap: 4px; }
            .player-avatar-wrap { flex:0 0 20px; width:20px; height:20px; }
            .player-name-input { font-size: 0.6rem; max-width: 55px; }
            .champ-btn { width: 12px; height: 12px; font-size: 0.5rem; }
            .trophy-icon-sm { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-right-note">筹码均为记分牌 无任何作用</div>

        <header class="header">
            <h1 class="header-title">All in Night</h1>
            <p class="header-subtitle">SNG娱乐赛</p>
        </header>

        <div class="main-content">
            <div class="left-panel">
                <div class="card">
                    <div class="level-display">
                        <div class="level-label">当前级别</div>
                        <div class="level-number" id="levelNumber">1</div>
                        <div style="font-size:0.65rem;color:var(--text-muted);">/ 20</div>
                    </div>
                    <div class="blinds-display">
                        <div class="blinds-label-sm">Small / Big</div>
                        <div class="blinds-value" id="blindsValue">100 / 200</div>
                    </div>
                    <div class="timer-display">
                        <div class="timer-label">倒计时</div>
                        <div class="timer-value" id="timerValue">05:00</div>
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-start" id="btnStart">▶ 开始</button>
                    <button class="btn btn-reset" id="btnReset">↺ 重置</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-skip" id="btnSkip">⏭ 跳过</button>
                </div>
                <button class="btn btn-add-player" id="btnAddPlayer">+ 添加选手</button>
            </div>

            <div class="right-panel">
                <div class="leaderboard-header">
                    <span class="leaderboard-title">
                        <span class="trophy-icon">🏆</span> 最强王者
                    </span>
                    <span style="font-size:0.65rem;color:var(--text-muted);" id="playerCount">0 位选手</span>
                </div>
                <div class="player-list" id="playerList">
                    <div class="empty-state">暂无选手，点击"+ 添加选手"开始</div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="level-up-overlay" id="levelUpOverlay">
        <div class="level-up-badge">
            <div class="lvl-text">Level Up! ⬆</div>
            <div class="lvl-blinds" id="levelUpBlinds">100 / 200</div>
        </div>
    </div>
    <input type="file" accept="image/*" id="avatarFileInput" style="display:none;">

    <script>
        (function() {
            // 20个盲注级别
            const BLIND_LEVELS = [
                { level: 1, small: 100, big: 200 },
                { level: 2, small: 200, big: 400 },
                { level: 3, small: 300, big: 600 },
                { level: 4, small: 400, big: 800 },
                { level: 5, small: 500, big: 1000 },
                { level: 6, small: 600, big: 1200 },
                { level: 7, small: 800, big: 1600 },
                { level: 8, small: 1000, big: 2000 },
                { level: 9, small: 1500, big: 3000 },
                { level: 10, small: 2000, big: 4000 },
                { level: 11, small: 3000, big: 6000 },
                { level: 12, small: 4000, big: 8000 },
                { level: 13, small: 5000, big: 10000 },
                { level: 14, small: 6000, big: 12000 },
                { level: 15, small: 8000, big: 16000 },
                { level: 16, small: 10000, big: 20000 },
                { level: 17, small: 12000, big: 24000 },
                { level: 18, small: 15000, big: 30000 },
                { level: 19, small: 20000, big: 40000 },
                { level: 20, small: 25000, big: 50000 }
            ];
            const TOTAL_LEVELS = BLIND_LEVELS.length;
            const LEVEL_DURATION_SECONDS = 5 * 60;

            const $levelNumber = document.getElementById('levelNumber');
            const $blindsValue = document.getElementById('blindsValue');
            const $timerValue = document.getElementById('timerValue');
            const $btnStart = document.getElementById('btnStart');
            const $btnReset = document.getElementById('btnReset');
            const $btnSkip = document.getElementById('btnSkip');
            const $btnAddPlayer = document.getElementById('btnAddPlayer');
            const $playerList = document.getElementById('playerList');
            const $playerCount = document.getElementById('playerCount');
            const $toast = document.getElementById('toast');
            const $levelUpOverlay = document.getElementById('levelUpOverlay');
            const $levelUpBlinds = document.getElementById('levelUpBlinds');
            const $avatarFileInput = document.getElementById('avatarFileInput');

            let currentLevelIndex = 0;
            let remainingSeconds = LEVEL_DURATION_SECONDS;
            let isRunning = false;
            let timerInterval = null;
            let players = [];
            let editingAvatarForPlayerId = null;
            let toastTimeout = null;
            let levelUpOverlayTimeout = null;

            // 防锁屏音频上下文（静默循环）
            let lockAudioCtx = null;
            function enableNoSleep() {
                try {
                    if (!lockAudioCtx) {
                        lockAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (lockAudioCtx.state === 'suspended') {
                        lockAudioCtx.resume();
                    }
                    // 创建一个极短的静默缓冲区并循环播放，防止手机自动锁屏
                    const buffer = lockAudioCtx.createBuffer(1, 1, 22050);
                    const source = lockAudioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.loop = true;
                    source.connect(lockAudioCtx.destination);
                    source.start(0);
                } catch (e) {
                    // 静默失败
                }
            }

            const STORAGE_KEY = 'all_in_night_data_v3';

            function saveData() {
                const data = {
                    currentLevelIndex,
                    remainingSeconds,
                    isRunning: false,
                    players: players.map(p => ({
                        id: p.id,
                        name: p.name,
                        avatar: p.avatar,
                        championships: p.championships
                    })),
                    savedAt: Date.now()
                };
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
            }

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if(!raw) return false;
                    const data = JSON.parse(raw);
                    if(data.currentLevelIndex >= 0 && data.currentLevelIndex < TOTAL_LEVELS)
                        currentLevelIndex = data.currentLevelIndex;
                    if(data.remainingSeconds >= 0 && data.remainingSeconds <= LEVEL_DURATION_SECONDS)
                        remainingSeconds = data.remainingSeconds;
                    if(data.players && Array.isArray(data.players)) {
                        players = data.players.map(p => ({
                            id: p.id || ('p_'+Date.now()+Math.random()),
                            name: p.name || '选手',
                            avatar: p.avatar || '',
                            championships: typeof p.championships === 'number' ? Math.max(0, p.championships) : 0
                        }));
                        sortPlayersByChampionships();
                    }
                    return true;
                } catch(e) { return false; }
            }

            function generateId() { return 'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }

            function sortPlayersByChampionships() {
                players.sort((a,b) => b.championships - a.championships);
            }

            function updateBlindsDisplay() {
                const level = BLIND_LEVELS[currentLevelIndex];
                $levelNumber.textContent = level.level;
                $blindsValue.textContent = level.small.toLocaleString() + ' / ' + level.big.toLocaleString();
                document.title = 'L'+level.level+' '+level.small+'/'+level.big+' - All in Night';
            }

            function updateTimerDisplay() {
                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;
                $timerValue.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
                $timerValue.classList.remove('warning','danger');
                if(isRunning) {
                    if(remainingSeconds <= 30 && remainingSeconds > 10) $timerValue.classList.add('warning');
                    else if(remainingSeconds <= 10) $timerValue.classList.add('danger');
                }
            }

            function updateStartButton() {
                if(isRunning) {
                    $btnStart.textContent = '⏸ 暂停';
                    $btnStart.classList.add('running');
                } else {
                    $btnStart.textContent = '▶ 开始';
                    $btnStart.classList.remove('running');
                }
            }

            function renderPlayerList() {
                $playerList.innerHTML = '';
                if(players.length === 0) {
                    $playerList.innerHTML = '<div class="empty-state">暂无选手，点击"+ 添加选手"开始</div>';
                } else {
                    players.forEach((player, index) => {
                        const row = document.createElement('div');
                        row.className = 'player-row';
                        if(index === 0 && player.championships > 0 && players.length > 1) row.classList.add('top-player');

                        const avatarWrap = document.createElement('div');
                        avatarWrap.className = 'player-avatar-wrap';
                        avatarWrap.title = '点击上传头像';
                        if(player.avatar) {
                            const img = document.createElement('img');
                            img.src = player.avatar;
                            avatarWrap.appendChild(img);
                        } else {
                            const placeholder = document.createElement('span');
                            placeholder.className = 'player-avatar-placeholder';
                            placeholder.textContent = player.name.charAt(0).toUpperCase();
                            avatarWrap.appendChild(placeholder);
                        }
                        const hint = document.createElement('span');
                        hint.className = 'player-avatar-upload-hint';
                        hint.textContent = '📷';
                        avatarWrap.appendChild(hint);
                        avatarWrap.addEventListener('click', ()=> triggerAvatarUpload(player.id));

                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'player-info';

                        const nameInput = document.createElement('input');
                        nameInput.type = 'text';
                        nameInput.className = 'player-name-input';
                        nameInput.value = player.name;
                        nameInput.placeholder = '名字';
                        nameInput.maxLength = 20;
                        nameInput.addEventListener('input', ()=>{
                            player.name = nameInput.value || '选手';
                            saveData();
                        });
                        nameInput.addEventListener('blur', ()=>{
                            if(!player.name.trim()) { player.name = '选手'; nameInput.value = '选手'; }
                            saveData();
                            renderPlayerList();
                        });

                        const champControl = document.createElement('div');
                        champControl.className = 'championship-control';
                        const trophy = document.createElement('span');
                        trophy.className = 'trophy-icon-sm'; trophy.textContent = '🏆';
                        const countSpan = document.createElement('span');
                        countSpan.className = 'champ-count'; countSpan.textContent = player.championships;

                        const btnMinus = document.createElement('button');
                        btnMinus.className = 'champ-btn'; btnMinus.textContent = '−';
                        btnMinus.addEventListener('click', (e)=>{
                            e.stopPropagation();
                            if(player.championships > 0) {
                                player.championships--;
                                sortPlayersByChampionships();
                                saveData();
                                renderPlayerList();
                                updatePlayerCount();
                            }
                        });
                        const btnPlus = document.createElement('button');
                        btnPlus.className = 'champ-btn'; btnPlus.textContent = '+';
                        btnPlus.addEventListener('click', (e)=>{
                            e.stopPropagation();
                            player.championships++;
                            sortPlayersByChampionships();
                            saveData();
                            renderPlayerList();
                            updatePlayerCount();
                        });

                        champControl.appendChild(trophy);
                        champControl.appendChild(btnMinus);
                        champControl.appendChild(countSpan);
                        champControl.appendChild(btnPlus);
                        infoDiv.appendChild(nameInput);
                        infoDiv.appendChild(champControl);

                        const btnDelete = document.createElement('button');
                        btnDelete.className = 'btn-delete-player';
                        btnDelete.textContent = '✕';
                        btnDelete.addEventListener('click', (e)=>{
                            e.stopPropagation();
                            if(confirm('确定删除选手"'+player.name+'"吗？')) {
                                players = players.filter(p=>p.id !== player.id);
                                sortPlayersByChampionships();
                                saveData();
                                renderPlayerList();
                                updatePlayerCount();
                                showToast('已删除: '+player.name);
                            }
                        });

                        row.appendChild(avatarWrap);
                        row.appendChild(infoDiv);
                        row.appendChild(btnDelete);
                        $playerList.appendChild(row);
                    });
                }
                updatePlayerCount();
            }

            function updatePlayerCount() {
                $playerCount.textContent = players.length + ' 位选手';
            }

            function updateAllUI() {
                updateBlindsDisplay();
                updateTimerDisplay();
                updateStartButton();
                renderPlayerList();
            }

            function showToast(msg, isLevelUp=false) {
                if(toastTimeout) clearTimeout(toastTimeout);
                $toast.textContent = msg;
                $toast.className = 'toast' + (isLevelUp ? ' level-up' : '');
                void $toast.offsetWidth;
                $toast.classList.add('show');
                toastTimeout = setTimeout(()=> $toast.classList.remove('show'), 2500);
            }

            function showLevelUpOverlay() {
                const level = BLIND_LEVELS[currentLevelIndex];
                $levelUpBlinds.textContent = level.small.toLocaleString() + ' / ' + level.big.toLocaleString();
                $levelUpOverlay.classList.add('active');
                if(levelUpOverlayTimeout) clearTimeout(levelUpOverlayTimeout);
                levelUpOverlayTimeout = setTimeout(()=> $levelUpOverlay.classList.remove('active'), 2200);
            }

            function speakLevelUp(levelData) {
                try {
                    if(window.speechSynthesis) window.speechSynthesis.cancel();
                    const utt = new SpeechSynthesisUtterance(
                        'Level '+levelData.level+'. Blinds are '+levelData.small+' and '+levelData.big+'.');
                    utt.lang = 'en-US'; utt.rate = 0.9; utt.pitch = 1.05;
                    setTimeout(()=> speechSynthesis.speak(utt), 150);
                } catch(e) {}
            }

            function speakGameStart() {
                try {
                    if(window.speechSynthesis) window.speechSynthesis.cancel();
                    const level = BLIND_LEVELS[currentLevelIndex];
                    const utt = new SpeechSynthesisUtterance(
                        'Game started. Level '+level.level+', blinds '+level.small+' and '+level.big+'.');
                    utt.lang = 'en-US'; utt.rate = 0.9;
                    setTimeout(()=> speechSynthesis.speak(utt), 100);
                } catch(e) {}
            }

            function startTimer() {
                if(isRunning) return;
                enableNoSleep(); // 防止锁屏
                if(remainingSeconds <= 0 && currentLevelIndex >= TOTAL_LEVELS-1) {
                    showToast('已是最后级别'); return;
                }
                if(remainingSeconds <= 0) advanceLevel();
                isRunning = true;
                updateStartButton();
                updateTimerDisplay();
                saveData();
                if(remainingSeconds === LEVEL_DURATION_SECONDS && currentLevelIndex === 0) speakGameStart();

                timerInterval = setInterval(()=>{
                    remainingSeconds--;
                    updateTimerDisplay();
                    if(remainingSeconds <= 0) {
                        clearInterval(timerInterval); timerInterval = null;
                        isRunning = false; updateStartButton();
                        if(currentLevelIndex < TOTAL_LEVELS-1) {
                            advanceLevel();
                            remainingSeconds = LEVEL_DURATION_SECONDS;
                            updateTimerDisplay();
                            saveData();
                            startTimer();
                        } else {
                            showToast('🏁 所有级别已完成！', true);
                            remainingSeconds = 0;
                            updateTimerDisplay();
                            saveData();
                            try {
                                if(window.speechSynthesis) {
                                    window.speechSynthesis.cancel();
                                    const utt = new SpeechSynthesisUtterance('Final level completed. Tournament finished.');
                                    utt.lang = 'en-US'; utt.rate = 0.85;
                                    setTimeout(()=> speechSynthesis.speak(utt), 200);
                                }
                            } catch(e) {}
                        }
                    }
                    if(remainingSeconds % 5 === 0 || remainingSeconds <= 10) saveData();
                }, 1000);
            }

            function pauseTimer() {
                if(!isRunning) return;
                clearInterval(timerInterval); timerInterval = null;
                isRunning = false; updateStartButton(); updateTimerDisplay(); saveData();
            }

            function resetTimer() {
                pauseTimer();
                currentLevelIndex = 0;
                remainingSeconds = LEVEL_DURATION_SECONDS;
                updateAllUI(); saveData();
                showToast('已重置到第1级别');
            }

            function advanceLevel() {
                if(currentLevelIndex < TOTAL_LEVELS-1) {
                    currentLevelIndex++;
                    remainingSeconds = LEVEL_DURATION_SECONDS;
                    const level = BLIND_LEVELS[currentLevelIndex];
                    updateBlindsDisplay(); updateTimerDisplay(); saveData();
                    showLevelUpOverlay();
                    showToast('⬆ 升至第'+level.level+'级别: '+level.small.toLocaleString()+'/'+level.big.toLocaleString(), true);
                    speakLevelUp(level);
                } else showToast('已是最后级别');
            }

            function skipLevel() {
                pauseTimer();
                if(currentLevelIndex < TOTAL_LEVELS-1) {
                    advanceLevel(); updateAllUI(); saveData();
                } else { showToast('已是最后级别，无法跳过'); resetTimer(); }
            }

            function triggerAvatarUpload(playerId) {
                editingAvatarForPlayerId = playerId;
                $avatarFileInput.value = '';
                $avatarFileInput.click();
            }

            function handleAvatarFileSelect(event) {
                const file = event.target.files[0];
                if(!file || !editingAvatarForPlayerId) return;
                if(!file.type.startsWith('image/')) { showToast('请选择图片文件'); return; }
                if(file.size > 10*1024*1024) { showToast('图片不能超过10MB'); return; }
                const reader = new FileReader();
                reader.onload = function(e) {
                    compressImage(e.target.result, 200, 200, 0.65, function(compressed){
                        const player = players.find(p=>p.id === editingAvatarForPlayerId);
                        if(player) { player.avatar = compressed; saveData(); renderPlayerList(); showToast('头像已更新 ✓'); }
                        editingAvatarForPlayerId = null;
                    });
                };
                reader.onerror = ()=> { showToast('读取图片失败'); editingAvatarForPlayerId = null; };
                reader.readAsDataURL(file);
            }

            function compressImage(base64, maxW, maxH, quality, callback) {
                const img = new Image();
                img.onload = function() {
                    let w = img.width, h = img.height;
                    if(w > maxW || h > maxH) { const r = Math.min(maxW/w, maxH/h); w = Math.round(w*r); h = Math.round(h*r); }
                    const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = ()=> callback(base64);
                img.src = base64;
            }

            function addPlayer() {
                const defaultNames = ['选手A','选手B','选手C','选手D','选手E','玩家1','玩家2'];
                const used = new Set(players.map(p=>p.name));
                let newName = '新选手';
                for(const n of defaultNames) { if(!used.has(n)) { newName = n; break; } }
                if(used.has(newName)) newName = '选手'+(players.length+1);
                players.push({ id: generateId(), name: newName, avatar: '', championships: 0 });
                sortPlayersByChampionships();
                saveData(); renderPlayerList();
                showToast('已添加: '+newName);
                setTimeout(()=> $playerList.scrollTop = $playerList.scrollHeight, 200);
            }

            document.addEventListener('visibilitychange', ()=>{
                if(document.hidden) {
                    if(isRunning && timerInterval) document._hiddenAt = Date.now();
                } else {
                    if(isRunning && document._hiddenAt) {
                        const elapsed = Math.floor((Date.now() - document._hiddenAt)/1000);
                        if(elapsed > 0) {
                            remainingSeconds = Math.max(0, remainingSeconds - elapsed);
                            updateTimerDisplay();
                            if(remainingSeconds <= 0) {
                                clearInterval(timerInterval); timerInterval = null;
                                isRunning = false; updateStartButton();
                                if(currentLevelIndex < TOTAL_LEVELS-1) {
                                    advanceLevel(); remainingSeconds = LEVEL_DURATION_SECONDS;
                                    updateTimerDisplay(); saveData(); startTimer();
                                } else {
                                    remainingSeconds = 0; updateTimerDisplay(); saveData();
                                    showToast('🏁 所有级别已完成！', true);
                                }
                            }
                            saveData();
                        }
                        document._hiddenAt = null;
                    }
                }
            });

            $btnStart.addEventListener('click', ()=> isRunning ? pauseTimer() : startTimer());
            $btnReset.addEventListener('click', ()=> { if(confirm('确定重置到第1级别吗？')) resetTimer(); });
            $btnSkip.addEventListener('click', ()=> { if(isRunning && !confirm('确定跳过当前级别吗？')) return; skipLevel(); });
            $btnAddPlayer.addEventListener('click', addPlayer);
            $avatarFileInput.addEventListener('change', handleAvatarFileSelect);

            document.addEventListener('keydown', (e)=>{
                if(e.target.tagName === 'INPUT' && e.target.type === 'text') return;
                switch(e.key.toLowerCase()) {
                    case ' ': e.preventDefault(); isRunning ? pauseTimer() : startTimer(); break;
                    case 'r': if(!e.ctrlKey && !e.metaKey) { e.preventDefault(); if(confirm('重置？')) resetTimer(); } break;
                    case 's': if(!e.ctrlKey && !e.metaKey) { e.preventDefault(); skipLevel(); } break;
                    case 'a': if(!e.ctrlKey && !e.metaKey) { e.preventDefault(); addPlayer(); } break;
                }
            });

            function init() {
                if(!loadData()) {
                    players = [
                        { id: generateId(), name: '选手1', avatar: '', championships: 2 },
                        { id: generateId(), name: '选手2', avatar: '', championships: 1 },
                        { id: generateId(), name: '选手3', avatar: '', championships: 0 }
                    ];
                    sortPlayersByChampionships();
                    currentLevelIndex = 0; remainingSeconds = LEVEL_DURATION_SECONDS;
                    saveData();
                }
                if(remainingSeconds > LEVEL_DURATION_SECONDS) remainingSeconds = LEVEL_DURATION_SECONDS;
                if(remainingSeconds < 0) remainingSeconds = 0;
                if(currentLevelIndex >= TOTAL_LEVELS) currentLevelIndex = TOTAL_LEVELS-1;
                if(currentLevelIndex < 0) currentLevelIndex = 0;
                isRunning = false; updateAllUI();
            }

            init();

            window.addEventListener('beforeunload', ()=>{ if(isRunning) pauseTimer(); saveData(); });
            setInterval(()=> { if(isRunning) saveData(); }, 30000);
        })();
    </script>
</body>
</html>
